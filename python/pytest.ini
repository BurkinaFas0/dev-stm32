[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: тесты, которые выполняются долго
    integration: интеграционные тесты
    fast: быстрые тесты
    unit: модульные тесты
addopts = 
    -v
    --tb=short
    --strict-markers
    -p no:warnings